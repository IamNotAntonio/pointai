<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Point</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #f4f4f5;
      overflow: hidden;
    }

    .header {
      padding: 18px 18px 14px;
      border-bottom: 1px solid #1e1e1e;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 34px; height: 34px;
      border-radius: 10px;
      background: linear-gradient(135deg, #1a7a4a, #22c55e);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 800; color: #fff;
      flex-shrink: 0;
    }

    .header-text .title { font-size: 14px; font-weight: 700; color: #f4f4f5; letter-spacing: -.2px; }
    .header-text .sub   { font-size: 11px; color: #52525b; margin-top: 1px; }

    .body { padding: 14px 18px; }

    .status-card {
      background: #141414;
      border: 1px solid #222;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #3f3f46;
      flex-shrink: 0;
    }
    .status-dot.active { background: #22c55e; box-shadow: 0 0 6px #22c55e80; }
    .status-dot.pending { background: #f59e0b; box-shadow: 0 0 6px #f59e0b80; }

    .status-label { font-size: 12px; color: #a1a1aa; line-height: 1.4; }
    .status-label strong { color: #f4f4f5; }

    .btn {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      gap: 6px;
      transition: opacity .15s;
      margin-bottom: 8px;
    }
    .btn:last-child { margin-bottom: 0; }
    .btn:disabled { opacity: .45; cursor: default; }
    .btn:hover:not(:disabled) { opacity: .88; }

    .btn-primary {
      background: linear-gradient(135deg, #1a7a4a, #22c55e);
      color: #fff;
    }

    .btn-ghost {
      background: #1c1c1c;
      border: 1px solid #2a2a2a;
      color: #a1a1aa;
    }

    .pending-banner {
      background: #1c1c00;
      border: 1px solid #3a3a00;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 11.5px;
      color: #fbbf24;
      line-height: 1.5;
      margin-bottom: 12px;
      display: none;
    }

    .footer {
      padding: 10px 18px 14px;
      border-top: 1px solid #1a1a1a;
    }

    .footer a {
      font-size: 11px;
      color: #3f3f46;
      text-decoration: none;
      display: block;
      text-align: center;
    }
    .footer a:hover { color: #71717a; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">P</div>
    <div class="header-text">
      <p class="title">Point</p>
      <p class="sub">Importador de notas acadêmicas</p>
    </div>
  </div>

  <div class="body">
    <div class="pending-banner" id="pendingBanner">
      📋 Há dados pendentes de importação. Abra o Point para confirmar.
    </div>

    <div class="status-card">
      <div class="status-dot" id="statusDot"></div>
      <p class="status-label" id="statusLabel">Verificando página...</p>
    </div>

    <button class="btn btn-primary" id="btnOpenApp">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
        <polyline points="15 3 21 3 21 9"/>
        <line x1="10" y1="14" x2="21" y2="3"/>
      </svg>
      Abrir Point
    </button>

    <button class="btn btn-ghost" id="btnClearPending" style="display:none">
      Limpar dados pendentes
    </button>
  </div>

  <div class="footer">
    <a href="https://pointai-two.vercel.app" target="_blank">pointai-two.vercel.app</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
